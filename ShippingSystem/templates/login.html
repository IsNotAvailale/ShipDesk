<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — ShipDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh">
<div class="card shadow-lg" style="width:100%;max-width:420px">
  <div class="card-body p-5">
    <div class="text-center mb-4">
      <i class="bi bi-box-seam display-4 text-dark"></i>
      <h2 class="fw-bold mt-2">ShipDesk</h2>
      <p class="text-muted">Shipping Management System</p>
    </div>

    {% if timeout %}
    <div class="alert alert-warning">
      <i class="bi bi-clock me-1"></i>Your session expired. Please log in again.
    </div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-4">
        <label class="form-label fs-5 fw-semibold" for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control form-control-lg"
               autocomplete="username" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label fs-5 fw-semibold" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control form-control-lg"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Log In
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
