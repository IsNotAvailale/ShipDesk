{% extends "base.html" %}
{% block title %}Add Client — ShipDesk{% endblock %}
{% block content %}

<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('clients.clients') }}" class="btn btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h1 class="fw-bold mb-0">Add New Client</h1>
</div>

<div class="card border-0 shadow-sm" style="max-width:700px">
  <div class="card-body p-4">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fs-5 fw-semibold">Full Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control form-control-lg"
                 value="{{ form.get('name','') }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fs-5 fw-semibold">Company</label>
          <input type="text" name="company" class="form-control form-control-lg"
                 value="{{ form.get('company','') }}">
        </div>
        <div class="col-12">
          <label class="form-label fs-5 fw-semibold">Street Address</label>
          <input type="text" name="address" class="form-control form-control-lg"
                 value="{{ form.get('address','') }}"
                 placeholder="123 Main St, Suite 4">
        </div>
        <div class="col-md-5">
          <label class="form-label fs-5 fw-semibold">City</label>
          <input type="text" name="city" class="form-control form-control-lg"
                 value="{{ form.get('city','') }}">
        </div>
        <div class="col-md-3">
          <label class="form-label fs-5 fw-semibold">State</label>
          <input type="text" name="state" class="form-control form-control-lg"
                 maxlength="2" placeholder="NY"
                 value="{{ form.get('state','') }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fs-5 fw-semibold">ZIP Code</label>
          <input type="text" name="zip" class="form-control form-control-lg"
                 maxlength="10" placeholder="10001"
                 value="{{ form.get('zip','') }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fs-5 fw-semibold">Email</label>
          <input type="email" name="email" class="form-control form-control-lg"
                 value="{{ form.get('email','') }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fs-5 fw-semibold">Phone</label>
          <input type="tel" name="phone" class="form-control form-control-lg"
                 value="{{ form.get('phone','') }}" placeholder="(555) 000-0000">
        </div>
      </div>
      <div class="d-flex gap-3 mt-4">
        <button type="submit" class="btn btn-dark btn-lg px-5 fw-bold">Save Client</button>
        <a href="{{ url_for('clients.clients') }}" class="btn btn-outline-secondary btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
